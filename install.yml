---
# Dotfiles-VM Installation Playbook
# Installs zsh-based configurations for Fedora VM environment

- name: Install dotfiles-vm
  hosts: localhost
  connection: local
  become: false

  vars:
    dotfiles_vm_dir: "{{ lookup('env', 'PWD') }}"
    stow_packages:
      - zsh
      - git
      - nvim
      - ripgrep
      - tmux

  tasks:
    - name: Display installation directory
      ansible.builtin.debug:
        msg: "Installing dotfiles-vm from: {{ dotfiles_vm_dir }}"

    - name: Upgrade all system packages
      become: true
      ansible.builtin.dnf:
        name: "*"
        state: latest
      tags: packages

    - name: Enable lazygit copr repository
      become: true
      ansible.builtin.command:
        cmd: dnf copr enable -y dejan/lazygit
      args:
        creates: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:dejan:lazygit.repo
      tags: packages

    - name: Enable mise copr repository
      become: true
      ansible.builtin.command:
        cmd: dnf copr enable -y jdxcode/mise
      args:
        creates: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:jdxcode:mise.repo
      tags: packages

    - name: Install prerequisite packages
      become: true
      ansible.builtin.dnf:
        name:
          - awscli2
          - bat
          - clangd
          - curl
          - fd-find
          - fzf
          - git
          - git-delta
          - jq
          - lazygit
          - lsof
          - mise
          - neovim
          - python3-pip
          - ripgrep
          - stow
          - tmux
          - tree
          - unzip
          - wget
          - xclip
          - xorg-x11-xauth
          - zsh
        state: present
      tags: packages

    - name: Initialize and update git submodules
      ansible.builtin.command:
        cmd: git submodule update --init --recursive
        chdir: "{{ dotfiles_vm_dir }}"
      register: submodule_result
      changed_when: "'Cloning into' in submodule_result.stderr or 'Submodule path' in submodule_result.stderr"
      tags: submodules

    - name: Stow dotfiles packages
      ansible.builtin.command:
        cmd: stow --adopt -d "{{ dotfiles_vm_dir }}/stow" -t "{{ ansible_env.HOME }}" "{{ item }}"
      loop: "{{ stow_packages }}"
      register: stow_result
      changed_when: stow_result.stdout != ""
      tags: stow

    - name: Reset the dotfiles dir
      ansible.builtin.command:
        cmd: git reset --hard
        chdir: "{{ dotfiles_vm_dir }}"

    - name: Enable ForwardX11 in /etc/ssh/ssh_config
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/ssh_config
        regexp: '^#?\s*ForwardX11\s+'
        line: "    ForwardX11 yes"
        state: present
      tags: ssh

    - name: Set ForwardX11Trusted to no in /etc/ssh/ssh_config
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/ssh_config
        regexp: '^#?\s*ForwardX11Trusted\s+'
        line: "    ForwardX11Trusted no"
        state: present
      tags: ssh

    - name: Create nvim-local config directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/nvim-local"
        state: directory
        mode: "0755"
      tags: nvim

    - name: Clone friendly-snipeets repository
      ansible.builtin.git:
        repo: https://github.com/aljendro/friendly-snippets.git
        dest: "{{ ansible_env.HOME }}/.config/nvim-local/friendly-snippets"
        version: HEAD
      tags: nvim

    - name: Install mise tools (node, go, rust)
      ansible.builtin.shell:
        cmd: |
          mise use --global node@24
          mise use --global go@latest
          mise use --global rust@latest
        executable: /bin/zsh
      register: mise_install_result
      changed_when: mise_install_result.stdout != ""
      tags: mise_tools

    - name: Install npm packages globally
      ansible.builtin.shell:
        cmd: |
          eval "$(mise activate --shims)"
          npm install -g neovim @anthropic-ai/claude-code @github/copilot corepack@latest
        executable: /bin/zsh
      register: npm_neovim_result
      changed_when: "'added' in npm_neovim_result.stdout or 'changed' in npm_neovim_result.stdout"
      tags: mise_tools

    - name: Add ~/.local/bin to PATH in ~/.zshrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.zshrc"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
      tags: claude

    - name: Create start_project.local.sh script
      ansible.builtin.copy:
        dest: "{{ dotfiles_vm_dir }}/start_project.local.sh"
        mode: "0755"
        content: |
          #!/bin/zsh

          session="dotfiles"
          tmux has-session -t $session 2>/dev/null

          if [ $? != 0 ]; then
            tmux new -d -t $session
            tmux rename-window -t $session:1 "Main"
            tmux send -t $session:1 "nvim README.md" C-m
          fi

          echo "$session"
      tags: scripts

    - name: Create .ignore file
      ansible.builtin.copy:
        dest: "{{ dotfiles_vm_dir }}/.ignore"
        mode: "0755"
        content: |
          !start_project.local.sh
      tags: scripts
